name: Build

on:
  # push:
  #   branches: [ main ]  # 当推送到main分支时触发
  # pull_request:
  #   branches: [ main ]  # 当对main分支发起PR时触发
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            name: pong0-win.exe
          - os: windows-latest
            target: node18-win-arm64
            name: pong0-win-arm64.exe
          - os: ubuntu-latest
            target: node18-linux-x64
            name: pong0-linux
          - os: ubuntu-latest
            target: node18-linux-arm64
            name: pong0-linux-arm64
          - os: macos-latest
            target: node18-macos-x64
            name: pong0-macos
          - os: macos-latest
            target: node18-macos-arm64
            name: pong0-macos-arm64

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # 修改package.json中的target
          node -e "const pkg = require('./package.json'); pkg.pkg.targets = ['${{ matrix.target }}']; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 运行构建脚本
          node scripts/build.js

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: pong0-${{ matrix.target }}
          path: dist/*.zip
          retention-days: 7  # 设置文件保留7天 